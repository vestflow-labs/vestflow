name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  # ── 1. Frontend build ────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CONTRACT_ID: CCZ6AE75C27DMB3SOIHK7WZSBUG3NQPVLHSVEBQ2FSAEVGRJ5TXAZWCX
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_NATIVE_TOKEN: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC

  # ── 2. Backend build (TypeScript type-check) ─────────────────
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ── 3. Contract build ────────────────────────────────────────
  contract-build:
    name: Contract Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32v1-none

      - name: Build WASM
        run: cargo build --release --target wasm32v1-none
        working-directory: contracts

  # ── 4. Contract tests ────────────────────────────────────────
  contract-test:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Run tests
        run: cargo test --verbose
        working-directory: contracts

  # ── 5. Testnet E2E Tests ─────────────────────────────────────
  testnet-e2e:
    name: Testnet E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32v1-none

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Stellar CLI
        run: |
          curl -fsSL https://install.stellar.org | bash
          echo "${HOME}/.stellar/bin" >> $GITHUB_PATH

      - name: Build contract
        run: cargo build --target wasm32v1-none --release
        working-directory: contracts

      - name: Run E2E tests on Testnet
        run: bash scripts/e2e-testnet.sh
        env:
          SOURCE_KEY: e2e-test
          NETWORK: testnet
          RPC_URL: https://soroban-testnet.stellar.org
        continue-on-error: true
